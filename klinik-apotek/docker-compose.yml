services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: klinik-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - /var/www/vendor
    command: >
      sh -c "until php -r '$$lines=explode(PHP_EOL, file_get_contents(\".env\")); $$e=[]; foreach($$lines as $$l){ $$p=explode(\"=\", $$l, 2); if(count($$p)===2) $$e[trim($$p[0])]=trim($$p[1]); } new PDO(\"mysql:host=\".$$e[\"DB_HOST\"].\";port=\".$$e[\"DB_PORT\"].\";dbname=\".$$e[\"DB_DATABASE\"], $$e[\"DB_USERNAME\"], $$e[\"DB_PASSWORD\"]);' >/dev/null 2>&1; do echo 'Waiting for database...'; sleep 2; done && php artisan migrate --force && php artisan db:seed --force && php-fpm"
    networks:
      - klinik-network

  web:
    image: nginx:alpine
    container_name: klinik-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - klinik-network

  db:
    image: mysql:8.0
    container_name: klinik-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - klinik-network

  vite:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: klinik-vite
    user: root
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - /var/www/node_modules
    command: npm run dev
    depends_on:
      - app
    networks:
      - klinik-network

networks:
  klinik-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
