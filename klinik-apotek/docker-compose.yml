services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: klinik-app
    user: root
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - /var/www/vendor
      - /var/www/public/build
    networks:
      - klinik-network

  web:
    image: nginx:alpine
    container_name: klinik-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /var/www/public/build
    depends_on:
      - app
    networks:
      - klinik-network

  db:
    image: mysql:8.0
    container_name: klinik-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - klinik-network

networks:
  klinik-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
