services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: klinik-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - klinik-network

  web:
    image: nginx:alpine
    container_name: klinik-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - klinik-network

  db:
    image: mysql:8.0
    container_name: klinik-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: klinik_db
      MYSQL_USER: klinik_user
      MYSQL_PASSWORD: klinik_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - klinik-network

  vite:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: klinik-vite
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - app
    networks:
      - klinik-network

networks:
  klinik-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
